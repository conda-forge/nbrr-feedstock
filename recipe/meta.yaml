{% set version = "0.1.2" %}

package:
  name: nbrr
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/nbrr/nbrr-{{ version }}.tar.gz
  sha256: 4e7bc828288e4e36ae1e0c5644928b1de57ca73591a99d61cb91a0434cd917a3

build:
  number: 1
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"
  entry_points:
    - nbrr = nbrr.nbrr:NBRR

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - depfinder
    - easyargs
    - gitpython
    - ruamel.yaml
    - git

test:
  requires:
    - python {{ python_min }}
  imports:
    - nbrr
  commands:
    - nbrr --help

about:
  home: https://github.com/pyoceans/nbrr
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Reproducible repository skeleton

extra:
  recipe-maintainers:
    - ocefpaf
